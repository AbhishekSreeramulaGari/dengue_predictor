{% extends 'base.html' %}
{% block title %}Register - Dengue Prediction System{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h3 class="mb-3">Register</h3>
            <form method="post" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required />
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required />
                </div>
                <div class="form-group">
                    <label for="role_code">Authority Code (optional)</label>
                    <input type="text" class="form-control" id="role_code" name="role_code" placeholder="Leave blank for public user" />
                </div>
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>
            <p class="mt-3">Already have an account? <a href="{{ url_for('login') }}">Login here</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
